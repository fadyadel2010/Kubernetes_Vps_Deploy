apiVersion: apps/v1
data:
  spec:
    template:
      $patch: replace
      metadata:
        annotations:
          redis.opstreelabs.in: "true"
          redis.opstreelabs.instance: redis
        labels:
          app: redis
          redis_setup_type: replication
          role: replication
      spec:
        containers:
        - env:
          - name: PERSISTENCE_ENABLED
            value: "true"
          - name: REDIS_ADDR
            value: redis://localhost:6379
          - name: REDIS_PORT
            value: "6379"
          - name: SERVER_MODE
            value: replication
          - name: SETUP_MODE
            value: replication
          image: quay.io/opstree/redis:v7.0.15
          imagePullPolicy: IfNotPresent
          livenessProbe:
            exec:
              command:
              - sh
              - -ec
              - |-
                RESP="$(redis-cli -h $(hostname) -p ${REDIS_PORT} ping)"
                [ "$RESP" = "PONG" ]
            failureThreshold: 3
            periodSeconds: 10
            successThreshold: 1
            timeoutSeconds: 1
          name: redis
          readinessProbe:
            exec:
              command:
              - sh
              - -ec
              - |-
                RESP="$(redis-cli -h $(hostname) -p ${REDIS_PORT} ping)"
                [ "$RESP" = "PONG" ]
            failureThreshold: 3
            periodSeconds: 10
            successThreshold: 1
            timeoutSeconds: 1
          resources: {}
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
          volumeMounts:
          - mountPath: /data
            name: redis
        - env:
          - name: REDIS_ADDR
            value: redis://localhost:6379
          image: quay.io/opstree/redis-exporter
          imagePullPolicy: Always
          name: redis-exporter
          ports:
          - containerPort: 9121
            name: redis-exporter
            protocol: TCP
          resources: {}
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
        dnsPolicy: ClusterFirst
        restartPolicy: Always
        schedulerName: default-scheduler
        securityContext: {}
        terminationGracePeriodSeconds: 30
        volumes:
        - emptyDir: {}
          name: config
