apiVersion: postgresql.cnpg.io/v1
kind: Cluster

metadata:
  name: shopixy-postgres
  namespace: postgresql

spec:
  instances: 3

  imageName: ghcr.io/cloudnative-pg/postgresql:17

  primaryUpdateStrategy: unsupervised

  storage:
    size: 20Gi

  resources:
    requests:
      cpu: "500m"
      memory: "1Gi"

    limits:
      cpu: "2"
      memory: "4Gi"

  monitoring:
    enablePodMonitor: true

  bootstrap:
    initdb:
      database: shopixy
      owner: shopixy

      secret:
        name: shopixy-postgres-secret
