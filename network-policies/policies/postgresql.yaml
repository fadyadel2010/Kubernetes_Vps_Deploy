apiVersion: networking.k8s.io/v1
kind: NetworkPolicy

metadata:
  name: postgresql
  namespace: postgresql

spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: postgresql

  policyTypes:
    - Ingress

  ingress:
    - from:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 5432

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy

metadata:
  name: default-deny
  namespace: postgresql

spec:
  podSelector: {}

  policyTypes:
    - Ingress
