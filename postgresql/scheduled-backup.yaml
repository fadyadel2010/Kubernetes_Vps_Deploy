apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup

metadata:
  name: shopixy-postgres-scheduled
  namespace: postgresql

spec:
  schedule: "0 0 2 * * *"

  backupOwnerReference: self

  cluster:
    name: shopixy-postgres

  method: plugin

  pluginConfiguration:
    name: barman-cloud.cloudnative-pg.io

  immediate: false
