apiVersion: barmancloud.cnpg.io/v1
kind: ObjectStore

metadata:
  name: shopixy-backup
  namespace: postgresql

spec:
  configuration:
    destinationPath: s3://shopixy-postgres
    endpointURL: http://minio.minio.svc.cluster.local:9000

    s3Credentials:
      accessKeyId:
        name: minio-backup-secret
        key: ACCESS_KEY_ID

      secretAccessKey:
        name: minio-backup-secret
        key: ACCESS_SECRET_KEY

    wal:
      compression: zstd
      maxParallel: 4

    data:
      compression: gzip
      jobs: 2

  retentionPolicy: 30d
