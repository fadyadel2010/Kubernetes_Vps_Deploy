apiVersion: 1

groups:
  - orgId: 1
    name: OpenSearch
    folder: Infrastructure
    interval: 1m

    rules:
      - uid: opensearchjvmcritical

        title: OpenSearch JVM Heap High Critical

        condition: C

        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: ffom74f70o2rkb
            model:
              editorMode: code
              expr: |
                max(
                  (
                    elasticsearch_jvm_memory_used_bytes{area="heap"}
                    /
                    elasticsearch_jvm_memory_max_bytes{area="heap"}
                  ) * 100
                )
              instant: true
              intervalMs: 1000
              legendFormat: __auto
              maxDataPoints: 43200
              range: false
              refId: A

          - refId: C
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params:
                      - 90
                    type: gte
                  operator:
                    type: and
                  query:
                    params:
                      - C
                  reducer:
                    params: []
                    type: last
                  type: query

              datasource:
                type: __expr__
                uid: __expr__

              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              refId: C
              type: threshold

        noDataState: Alerting
        execErrState: Alerting

        for: 5m

        annotations:
          summary: OpenSearch JVM heap usage is above 90%
          description: JVM heap utilization has exceeded 90% for more than 5 minutes. Cluster stability and performance may be at risk.

        labels:
          severity: critical
          stack: opensearch

        isPaused: false
