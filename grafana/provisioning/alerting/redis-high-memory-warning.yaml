apiVersion: 1

groups:
  - orgId: 1
    name: Redis
    folder: Infrastructure
    interval: 1m

    rules:
      - uid: redishighmemorywarning

        title: Redis High Memory Usage

        condition: C

        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: ffom74f70o2rkb
            model:
              editorMode: code
              expr: |
                (
                  max(container_memory_working_set_bytes{namespace="redis",container="redis"})
                  /
                  (4 * 1024 * 1024 * 1024)
                ) * 100
              instant: true
              intervalMs: 1000
              legendFormat: __auto
              maxDataPoints: 43200
              range: false
              refId: A

          - refId: C
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params:
                      - 80
                    type: gt
                  operator:
                    type: and
                  query:
                    params:
                      - C
                  reducer:
                    params: []
                    type: last
                  type: query

              datasource:
                type: __expr__
                uid: __expr__

              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              refId: C
              type: threshold

        noDataState: NoData
        execErrState: Alerting

        for: 5m

        annotations:
          summary: Redis memory usage exceeded 80% of configured limit

        labels:
          severity: warning
          stack: redis

        isPaused: false
