apiVersion: 1

groups:
  - orgId: 1
    name: OpenSearch
    folder: Infrastructure
    interval: 1m

    rules:
      - uid: opensearchclusteryellow

        title: OpenSearch Cluster Yellow

        condition: C

        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: ffom74f70o2rkb
            model:
              editorMode: code
              expr: elasticsearch_cluster_health_status{color="yellow"}
              instant: true
              intervalMs: 1000
              legendFormat: __auto
              maxDataPoints: 43200
              range: false
              refId: A

          - refId: C
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params:
                      - 1
                    type: gte
                  operator:
                    type: and
                  query:
                    params:
                      - C
                  reducer:
                    params: []
                    type: last
                  type: query

              datasource:
                type: __expr__
                uid: __expr__

              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              refId: C
              type: threshold

        noDataState: Alerting
        execErrState: Alerting

        for: 5m

        annotations:
          summary: OpenSearch cluster health is YELLOW
          description: Replica shards are unavailable or allocation is incomplete. Cluster remains operational but redundancy is reduced.

        labels:
          severity: warning
          stack: opensearch

        isPaused: false
