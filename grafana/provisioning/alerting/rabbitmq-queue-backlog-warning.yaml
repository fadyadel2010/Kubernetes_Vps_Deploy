apiVersion: 1

groups:
  - orgId: 1
    name: RabbitMQ
    folder: Infrastructure
    interval: 1m

    rules:
      - uid: rabbitmqqueuebacklog

        title: RabbitMQ Queue Backlog

        condition: C

        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: ffom74f70o2rkb
            model:
              editorMode: code
              expr: max(rabbitmq_queue_messages)
              instant: true
              intervalMs: 1000
              legendFormat: __auto
              maxDataPoints: 43200
              range: false
              refId: A

          - refId: C
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params:
                      - 1000
                    type: gt
                  operator:
                    type: and
                  query:
                    params:
                      - C
                  reducer:
                    params: []
                    type: last
                  type: query

              datasource:
                type: __expr__
                uid: __expr__

              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              refId: C
              type: threshold

        noDataState: OK
        execErrState: Alerting

        for: 10m

        annotations:
          summary: RabbitMQ queue backlog exceeded 1000 messages

        labels:
          severity: warning
          stack: rabbitmq

        isPaused: false
