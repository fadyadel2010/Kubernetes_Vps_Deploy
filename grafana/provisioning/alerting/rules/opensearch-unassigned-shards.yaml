apiVersion: 1

groups:
  - orgId: 1
    name: OpenSearch
    folder: Infrastructure
    interval: 1m

    rules:
      - uid: opensearchunassigned

        title: OpenSearch Unassigned Shards

        condition: C

        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: prometheus
            model:
              editorMode: code
              expr: elasticsearch_cluster_health_unassigned_shards
              instant: true
              intervalMs: 1000
              legendFormat: __auto
              maxDataPoints: 43200
              range: false
              refId: A

          - refId: C
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params:
                      - 0
                    type: gt
                  operator:
                    type: and
                  query:
                    params:
                      - C
                  reducer:
                    params: []
                    type: last
                  type: query

              datasource:
                type: __expr__
                uid: __expr__

              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              refId: C
              type: threshold

        noDataState: Alerting
        execErrState: Alerting

        for: 2m

        annotations:
          summary: OpenSearch has unassigned shards
          description: One or more shards are unassigned. Data availability or redundancy may be affected.

        labels:
          severity: critical
          stack: opensearch

        isPaused: false
