apiVersion: 1

groups:
  - orgId: 1
    name: Redis
    folder: Infrastructure
    interval: 1m

    rules:
      - uid: redismasterchanged

        title: Redis Master Changed

        condition: C

        data:
          - refId: A
            relativeTimeRange:
              from: 900
              to: 0
            datasourceUid: prometheus
            model:
              editorMode: code
              expr: changes(redis_instance_info{role="master"}[15m])
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              range: false
              refId: A

          - refId: C
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params:
                      - 0
                    type: gt
                  operator:
                    type: and
                  query:
                    params:
                      - C
                  reducer:
                    params: []
                    type: last
                  type: query

              datasource:
                type: __expr__
                uid: __expr__

              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              refId: C
              type: threshold

        noDataState: OK
        execErrState: Alerting

        for: 0m

        annotations:
          summary: Redis master changed (Sentinel failover detected)

        labels:
          severity: warning
          stack: redis

        isPaused: false
