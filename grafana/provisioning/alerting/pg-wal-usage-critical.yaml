apiVersion: 1

groups:
  - orgId: 1
    name: Postgres
    folder: Infrastructure
    interval: 1m

    rules:
      - uid: pgwalusagecritical

        title: PostgreSQL WAL Usage Critical

        condition: C

        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: prometheus
            model:
              editorMode: code
              expr: |
                (
                  max(cnpg_collector_pg_wal{value="count"})
                  /
                  max(cnpg_collector_pg_wal{value="max"})
                ) * 100
              instant: true
              intervalMs: 1000
              legendFormat: __auto
              maxDataPoints: 43200
              range: false
              refId: A

          - refId: C
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params:
                      - 95
                    type: gt
                  operator:
                    type: and
                  query:
                    params:
                      - C
                  reducer:
                    params: []
                    type: last
                  type: query

              datasource:
                type: __expr__
                uid: __expr__

              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              refId: C
              type: threshold

        noDataState: OK
        execErrState: Alerting

        for: 2m

        annotations:
          summary: WAL usage exceeded 95%

        labels:
          severity: critical
          stack: postgres

        isPaused: false
