apiVersion: 1

groups:
  - orgId: 1
    name: RabbitMQ
    folder: Infrastructure
    interval: 1m

    rules:
      - uid: rabbitmqhighmemcrit

        title: RabbitMQ Critical Memory Usage

        condition: C

        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: prometheus
            model:
              editorMode: code
              expr: |
                max(
                  rabbitmq_process_resident_memory_bytes
                  /
                  rabbitmq_resident_memory_limit_bytes
                )
              instant: true
              intervalMs: 1000
              legendFormat: __auto
              maxDataPoints: 43200
              range: false
              refId: A

          - refId: C
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params:
                      - 0.9
                    type: gt
                  operator:
                    type: and
                  query:
                    params:
                      - C
                  reducer:
                    params: []
                    type: last
                  type: query

              datasource:
                type: __expr__
                uid: __expr__

              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              refId: C
              type: threshold

        noDataState: OK
        execErrState: Alerting

        for: 2m

        annotations:
          summary: RabbitMQ memory usage exceeded 90%

        labels:
          severity: critical
          stack: rabbitmq

        isPaused: false
