apiVersion: 1

groups:
  - orgId: 1
    name: RabbitMQ
    folder: Infrastructure
    interval: 1m

    rules:
      - uid: rabbitmqclusterdown

        title: RabbitMQ Cluster Down

        condition: C

        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: ffom74f70o2rkb
            model:
              editorMode: code
              expr: count(up{job="rabbitmq"} == 1)
              instant: true
              intervalMs: 1000
              legendFormat: __auto
              maxDataPoints: 43200
              range: false
              refId: A

          - refId: C
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params:
                      - 3
                    type: lt
                  operator:
                    type: and
                  query:
                    params:
                      - C
                  reducer:
                    params: []
                    type: last
                  type: query

              datasource:
                type: __expr__
                uid: __expr__

              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              refId: C
              type: threshold

        noDataState: OK
        execErrState: Alerting

        for: 2m

        annotations:
          summary: RabbitMQ cluster has lost one or more nodes

        labels:
          severity: critical
          stack: rabbitmq

        isPaused: false
