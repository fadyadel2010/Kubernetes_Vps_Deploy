apiVersion: 1

groups:
  - orgId: 1
    name: Redis
    folder: Infrastructure
    interval: 1m

    rules:
      - uid: redismissingreplica

        title: Redis Missing Replica

        condition: C

        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: ffom74f70o2rkb
            model:
              editorMode: code
              expr: max(redis_connected_slaves)
              instant: true
              intervalMs: 1000
              legendFormat: __auto
              maxDataPoints: 43200
              range: false
              refId: A

          - refId: C
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params:
                      - 2
                    type: lt
                  operator:
                    type: and
                  query:
                    params:
                      - C
                  reducer:
                    params: []
                    type: last
                  type: query

              datasource:
                type: __expr__
                uid: __expr__

              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              refId: C
              type: threshold

        noDataState: Alerting
        execErrState: Alerting

        for: 2m

        annotations:
          summary: Redis master has fewer than 2 connected replicas

        labels:
          severity: warning
          stack: redis

        isPaused: false
