apiVersion: 1

groups:
  - orgId: 1
    name: Postgres
    folder: Infrastructure
    interval: 1m

    rules:
      - uid: pg_missing_replica

        title: PostgreSQL Missing Replica

        condition: C

        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: ffom74f70o2rkb
            model:
              editorMode: code
              expr: max(cnpg_pg_replication_streaming_replicas)
              instant: true
              intervalMs: 1000
              legendFormat: __auto
              maxDataPoints: 43200
              range: false
              refId: A

          - refId: C
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params:
                      - 2
                    type: lt
                  operator:
                    type: and
                  query:
                    params:
                      - C
                  reducer:
                    params: []
                    type: last
                  type: query

              datasource:
                type: __expr__
                uid: __expr__

              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              refId: C
              type: threshold

        noDataState: Alerting
        execErrState: Alerting

        for: 2m

        labels:
          severity: critical
          stack: postgres

        annotations: {}

        isPaused: false

        
