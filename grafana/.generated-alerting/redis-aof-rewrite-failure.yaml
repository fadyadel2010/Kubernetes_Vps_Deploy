apiVersion: 1

groups:
  - orgId: 1
    name: Redis
    folder: Infrastructure
    interval: 1m

    rules:
      - uid: redisaofrewritefailure

        title: Redis AOF Rewrite Failure

        condition: C

        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: prometheus
            model:
              editorMode: code
              expr: min(redis_aof_last_bgrewrite_status)
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              range: false
              refId: A

          - refId: C
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params:
                      - 1
                    type: lt
                  operator:
                    type: and
                  query:
                    params:
                      - C
                  reducer:
                    params: []
                    type: last
                  type: query

              datasource:
                type: __expr__
                uid: __expr__

              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              refId: C
              type: threshold

        noDataState: Alerting
        execErrState: Alerting

        for: 2m

        annotations:
          summary: Redis AOF background rewrite failed

        labels:
          severity: critical
          stack: redis

        isPaused: false
