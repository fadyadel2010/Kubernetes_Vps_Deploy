apiVersion: v1
kind: Service

metadata:
  name: rabbitmq-metrics
  namespace: rabbitmq

  labels:
    app.kubernetes.io/name: rabbitmq

spec:
  type: ClusterIP

  selector:
    app.kubernetes.io/name: rabbitmq

  ports:
    - name: prometheus
      protocol: TCP
      port: 15692
      targetPort: 15692
