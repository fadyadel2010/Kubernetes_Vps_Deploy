apiVersion: cert-manager.io/v1
kind: Certificate

metadata:
  name: rabbitmq-server-cert
  namespace: rabbitmq

spec:
  secretName: rabbitmq-server-tls

  duration: 2160h
  renewBefore: 360h

  issuerRef:
    name: rabbitmq-ca-issuer
    kind: Issuer

  dnsNames:
    - rabbitmq
    - rabbitmq.rabbitmq
    - rabbitmq.rabbitmq.svc
    - rabbitmq.rabbitmq.svc.cluster.local

    - rabbitmq-nodes
    - rabbitmq-nodes.rabbitmq
    - rabbitmq-nodes.rabbitmq.svc
    - rabbitmq-nodes.rabbitmq.svc.cluster.local

    - "*.rabbitmq-nodes.rabbitmq"
    - "*.rabbitmq-nodes.rabbitmq.svc"
    - "*.rabbitmq-nodes.rabbitmq.svc.cluster.local"
