replicaCount: 1

# Populated dynamically by bootstrap.sh via --set-string es.uri
es:
  uri: "https://shopixy-search:9200"

  all: true
  indices: true
  indices_settings: true
  indices_mappings: true
  shards: true
  snapshots: true

  sslSkipVerify: true

serviceMonitor:
  enabled: true

  namespace: prometheus

  interval: 30s

  labels:
    release: prometheus

resources:
  requests:
    cpu: 100m
    memory: 128Mi

  limits:
    cpu: 250m
    memory: 256Mi
